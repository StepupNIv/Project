---
# NOTE: In production use External Secrets Operator or AWS Secrets Manager.
# These are base64-encoded placeholder values — REPLACE before applying.
# echo -n 'yourvalue' | base64
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: production
  labels:
    app: devops-app
type: Opaque
data:
  # apppassword (base64)
  DB_PASSWORD: YXBwcGFzc3dvcmQ=
  # appuser (base64)
  DB_USER: YXBwdXNlcg==
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secrets
  namespace: database
  labels:
    app: mysql
type: Opaque
data:
  # rootpassword (base64)
  MYSQL_ROOT_PASSWORD: cm9vdHBhc3N3b3Jk
  # apppassword (base64)
  MYSQL_PASSWORD: YXBwcGFzc3dvcmQ=
  # appuser (base64)
  MYSQL_USER: YXBwdXNlcg==
---
apiVersion: v1
kind: Secret
metadata:
  name: ecr-registry-secret
  namespace: production
type: kubernetes.io/dockerconfigjson
data:
  # Replace with: kubectl create secret docker-registry ecr-registry-secret ...
  .dockerconfigjson: e30=
