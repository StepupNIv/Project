---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: devops-app-pdb
  namespace: production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: devops-app
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mysql-pdb
  namespace: database
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mysql
